<div class="container">
  <h1>Todo List</h1>

  <div class="add-todo">
    <input
      type="text"
      [(ngModel)]="newTitle"
      placeholder="Add a new task..."
      (keyup.enter)="addTodo()"
    />
    <input
      type="datetime-local"
      [(ngModel)]="newDeadline"
      class="deadline-input"
    />
    <button (click)="addTodo()">Add</button>
  </div>

  <p *ngIf="todos.length === 0" class="empty">No tasks yet. Add one above!</p>

  <ul>
    <li *ngFor="let todo of todos" [class.completed]="todo.completed">
      <input
        type="checkbox"
        [checked]="todo.completed"
        (change)="toggleCompleted(todo)"
      />
      <div class="todo-details">
        <span>{{ todo.title }}</span>
        <small class="timestamp" *ngIf="todo.createdAt">Created: {{ todo.createdAt | date:'short' }}</small>
        <small class="deadline" *ngIf="todo.deadline">Deadline: {{ todo.deadline | date:'short' }}</small>
      </div>
      <button class="delete" (click)="deleteTodo(todo.id)">✕</button>
    </li>
  </ul>
</div>

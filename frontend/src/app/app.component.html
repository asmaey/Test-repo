<div class="container" [class.dark]="darkMode">
  <div class="header">
    <h1>Todo List</h1>
    <button class="theme-toggle" (click)="toggleDarkMode()" [attr.aria-label]="darkMode ? 'Switch to light mode' : 'Switch to dark mode'">
      {{ darkMode ? '☀️' : '🌙' }}
    </button>
  </div>

  <div class="add-todo">
    <input
      type="text"
      [(ngModel)]="newTitle"
      placeholder="Add a new task..."
      (keyup.enter)="addTodo()"
    />
    <button (click)="addTodo()">Add</button>
  </div>

  <p *ngIf="todos.length === 0" class="empty">No tasks yet. Add one above!</p>

  <ul>
    <li *ngFor="let todo of todos" [class.completed]="todo.completed">
      <input
        type="checkbox"
        [checked]="todo.completed"
        (change)="toggleCompleted(todo)"
      />
      <span>{{ todo.title }}</span>
      <button class="delete" (click)="deleteTodo(todo.id)">✕</button>
    </li>
  </ul>
</div>
